<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Helixon Energy Intelligence</title>


<!-- GOOGLE FONT -->

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">


<!-- CSS FILE -->

<link rel="stylesheet" href="style.css">


<!-- CHART JS -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="dashboard">

<!-- HEADER -->

<div class="logo">HELIXON</div>

<div class="subtitle">
Energy Intelligence Platform
</div>



<!-- FILTER -->

<div class="filters">

<select id="facilityFilter">

<option value="all">
All Facilities
</option>

</select>


<select id="energyFilter">

<option value="all">
All Energy Types
</option>

</select>

</div>



<!-- KPI -->

<section
id="kpi-container"
class="kpi-grid"
>

</section>



<!-- CHART GRID -->

<section
class="charts-grid"
>

<div class="panel">

<h3>
Energy Emission Mix
</h3>

<canvas id="mixChart"></canvas>

</div>


<div class="panel">

<h3>
Emission Trend
</h3>

<canvas id="trendChart"></canvas>

</div>


<div class="panel">

<h3>
Energy Type Comparison
</h3>

<canvas id="energyCompareChart"></canvas>

</div>


<div class="panel">

<h3>
Carbon Price Tracker
</h3>

<div id="carbonPrice"></div>

</div>


<div class="panel">

<h3>
AI Energy Recommendation
</h3>

<div
id="aiPanel"
class="ai-box"
></div>

</div>


<div class="panel">

<h3>
Generate ESG Report
</h3>

<button onclick="generateESG()">
Generate ESG Summary
</button>

<pre id="esgOutput"></pre>

</div>


</section>



<!-- LOADING -->

<div id="loading">

Loading data...

</div>



</div>



<!-- SCRIPT -->

<script type="module" src="script.js"></script>


</body>
</html>

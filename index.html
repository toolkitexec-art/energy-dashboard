<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Helixon Energy Intelligence</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- HELIXON HEADER -->

<div class="helixon-header">

<div class="helixon-brand">

<img src="logo-helixon.png" class="helixon-logo">

<div class="helixon-title">

<div class="helixon-name">HELIXON</div>

<div class="helixon-sub">Energy Intelligence</div>

</div>

</div>

</div>


<!-- FILTER -->

<div class="filters">

<select id="facilitySelect"></select>

<select id="monthSelect">

<option value="all">All Months</option>
<option value="1">January</option>
<option value="2">February</option>
<option value="3">March</option>
<option value="4">April</option>
<option value="5">May</option>
<option value="6">June</option>
<option value="7">July</option>
<option value="8">August</option>
<option value="9">September</option>
<option value="10">October</option>
<option value="11">November</option>
<option value="12">December</option>

</select>

</div>


<!-- KPI -->

<div class="kpi-grid">

<div class="kpi-card">

<div class="kpi-title">Total Usage</div>
<div id="total-usage" class="kpi-value"></div>

</div>

<div class="kpi-card">

<div class="kpi-title">Total Cost</div>
<div id="total-cost" class="kpi-value"></div>

</div>

<div class="kpi-card">

<div class="kpi-title">Total Emission</div>
<div id="total-emission" class="kpi-value"></div>

</div>

</div>


<!-- ANALYTICS -->

<div class="analytics-grid">

<div class="analytics-card">

<div class="kpi-title">Industry Benchmark</div>
<div id="benchmark-value"></div>

</div>

<div class="analytics-card">

<div class="kpi-title">Energy Efficiency Score</div>
<div id="efficiency-score"></div>

</div>

<div class="analytics-card">

<div class="kpi-title">Emission Reduction Potential</div>
<div id="reduction-ai"></div>

</div>

<div class="analytics-card">

<div class="kpi-title">Cost Saving Opportunity</div>
<div id="saving-ai"></div>

</div>

</div>


<!-- ENERGY TYPE CHART -->

<div class="chart-panel">

<div class="chart-title">

Energy Type Comparison

</div>

<canvas id="energyChart"></canvas>

</div>


<!-- EMISSION TREND -->

<div class="chart-panel">

<div class="chart-title">

Emission Trend

</div>

<canvas id="trendChart"></canvas>

</div>


<!-- FACILITY COMPARISON -->

<div class="chart-panel">

<div class="chart-title">

Facility Comparison

</div>

<canvas id="facilityChart"></canvas>

</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helixon Energy Intelligence</title>

<link rel="stylesheet" href="style.css">

<style>

/* Header logo – tidak mempengaruhi sistem */
.helixon-header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.helixon-logo{
width:36px;
height:36px;
object-fit:contain;
filter:drop-shadow(0 0 6px rgba(59,130,246,0.6));
}

</style>

</head>
<body>

<!-- HEADER -->
<div class="helixon-header">
<img src="logo-helixon.png" class="helixon-logo">
<h1>Helixon Energy Intelligence</h1>
</div>


<!-- FILTER -->
<div class="filters">

<select id="facilitySelect"></select>

<select id="monthSelect">
<option value="all">All Months</option>
<option value="1">January</option>
<option value="2">February</option>
<option value="3">March</option>
<option value="4">April</option>
<option value="5">May</option>
<option value="6">June</option>
<option value="7">July</option>
<option value="8">August</option>
<option value="9">September</option>
<option value="10">October</option>
<option value="11">November</option>
<option value="12">December</option>
</select>

</div>


<!-- KPI CARDS -->
<div class="kpi-grid">

<div class="kpi-card">
<div>Total Usage</div>
<div id="total-usage"></div>
</div>

<div class="kpi-card">
<div>Total Cost</div>
<div id="total-cost"></div>
</div>

<div class="kpi-card">
<div>Total Emission</div>
<div id="total-emission"></div>
</div>

</div>


<!-- ANALYTICS -->
<div class="analytics-grid">

<div class="analytics-card">
<div>Industry Benchmark</div>
<div id="benchmark-value"></div>
</div>

<div class="analytics-card">
<div>Energy Efficiency Score</div>
<div id="efficiency-score"></div>
</div>

<div class="analytics-card">
<div>Emission Reduction Potential</div>
<div id="reduction-ai"></div>
</div>

<div class="analytics-card">
<div>Cost Saving Opportunity</div>
<div id="saving-ai"></div>
</div>

</div>


<!-- ENERGY TYPE CHART -->
<h3>Energy Type Comparison</h3>
<canvas id="energyChart"></canvas>


<!-- EMISSION TREND -->
<h3>Emission Trend</h3>
<canvas id="trendChart"></canvas>


<!-- FACILITY COMPARISON -->
<h3>Facility Comparison</h3>
<canvas id="facilityChart"></canvas>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- SCRIPT SISTEM (TIDAK DIUBAH) -->
<script src="script.js"></script>

</body>
</html>

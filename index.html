<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Helixon Energy Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

<header class="header">
<div class="logo">HELIXON</div>
<div class="subtitle">Energy Intelligence Platform</div>
</header>

<div class="filters">
<select id="facilityFilter"></select>
</div>

<section id="kpi-container" class="kpi-grid"></section>

<section class="charts-grid">

<div class="panel">
<h3>Energy Emission Mix</h3>
<canvas id="stackedChart"></canvas>
</div>

<div class="panel">
<h3>Emission Trend</h3>
<canvas id="trendChart"></canvas>
</div>

<div class="panel">
<h3>Energy Cost Breakdown</h3>
<canvas id="costChart"></canvas>
</div>

<div class="panel">
<h3>Carbon Intensity</h3>
<canvas id="intensityChart"></canvas>
</div>

</section>

<div id="loading">Loading data...</div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>

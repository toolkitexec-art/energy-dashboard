<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Energy Emission Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Arial;
  margin:20px
}

.kpi-card{
  border:1px solid #ccc;
  padding:10px;
  border-radius:8px;
  margin:5px;
  display:inline-block;
  min-width:160px;
  text-align:center;
  font-size:16px
}
</style>
</head>

<body>

<h2>KPI Cards</h2>
<div id="kpi-container"></div>

<h2>Stacked Chart: Emission per Energy Type</h2>
<canvas id="stackedChart"></canvas>

<h2>Trend Line: Total Emission per Month</h2>
<canvas id="trendChart"></canvas>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const SUPABASE_URL = "https://otzxkvdkpbsyrbiqtbjd.supabase.co"

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90enhrdmRrcGJzeXJiaXF0YmpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1NTY3NDYsImV4cCI6MjA4NzEzMjc0Nn0.tmLk2MoEpRbAdZNT5tRZTRvH_laeRo5Y1t-ollBGNAQ"

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

async function loadDashboard(){

  const { data, error } = await supabase
  .from("dashboard_phase2_final_named")
  .select("*")

  if(error){
    console.error(error)
    return
  }

  console.log(data)

  renderKPI(data)
  renderStack(data)
  renderTrend(data)

}

function renderKPI(data){

  const container = document.getElementById("kpi-container")

  const totalUsage =
    data.reduce((sum,r)=> sum + Number(r.total_usage),0)

  const totalCost =
    data.reduce((sum,r)=> sum + Number(r.total_cost),0)

  const totalEmission =
    data.reduce((sum,r)=> sum + Number(r.total_emission),0)

  container.innerHTML = `
    <div class="kpi-card">
      <b>Total Usage</b><br>${totalUsage.toFixed(2)}
    </div>

    <div class="kpi-card">
      <b>Total Cost</b><br>${totalCost.toFixed(2)}
    </div>

    <div class="kpi-card">
      <b>Total Emission</b><br>${totalEmission.toFixed(2)}
    </div>
  `
}

function renderStack(data){

  const labels = [...new Set(data.map(d=>d.energy_type_record))]

  const values = labels.map(type=>{
    return data
    .filter(r=>r.energy_type_record===type)
    .reduce((sum,r)=> sum + Number(r.total_emission),0)
  })

  new Chart(document.getElementById("stackedChart"),{
    type:"bar",
    data:{
      labels:labels,
      datasets:[{
        label:"Emission by Energy Type",
        data:values
      }]
    }
  })
}

function renderTrend(data){

  const months =
  [...new Set(data.map(d=>d.month.substring(0,7)))]

  const values = months.map(m=>{
    return data
    .filter(r=>r.month.startsWith(m))
    .reduce((sum,r)=> sum + Number(r.total_emission),0)
  })

  new Chart(document.getElementById("trendChart"),{
    type:"line",
    data:{
      labels:months,
      datasets:[{
        label:"Total Emission",
        data:values
      }]
    }
  })
}

loadDashboard()

</script>

</body>
</html>

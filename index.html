<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Helixon Energy Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter,system-ui;
background:#020617;
color:#e5e7eb;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

h1{
font-size:28px;
font-weight:600;
margin-bottom:25px;
}

.filters{
display:flex;
gap:20px;
margin-bottom:25px;
}

select{
background:#0f172a;
color:white;
border:1px solid #334155;
padding:10px 14px;
border-radius:8px;
font-size:14px;
}

.kpi-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.kpi-card{
background:linear-gradient(145deg,#0f172a,#1e293b);
padding:18px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
font-size:15px;
}

.analytics-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.analytics-card{
background:linear-gradient(145deg,#0f172a,#1e293b);
padding:18px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

.analytics-title{
font-size:13px;
color:#94a3b8;
margin-bottom:6px;
}

.analytics-value{
font-size:20px;
font-weight:600;
}

.chart-card{
background:linear-gradient(145deg,#0f172a,#1e293b);
border-radius:14px;
padding:20px;
margin-bottom:25px;
}

canvas{
max-height:320px;
}

</style>
</head>

<body>

<div class="container">

<h1>Helixon Energy Intelligence</h1>

<div class="filters">

<select id="facility-select">
<option value="all">All Facilities</option>
</select>

<select id="month-select">
<option value="all">All Months</option>
</select>

</div>

<div id="kpi-container" class="kpi-grid"></div>

<div class="analytics-grid">

<div class="analytics-card">
<div class="analytics-title">Industry Benchmark</div>
<div id="benchmark-value" class="analytics-value">Loading...</div>
</div>

<div class="analytics-card">
<div class="analytics-title">Energy Efficiency Score</div>
<div id="efficiency-score" class="analytics-value">Loading...</div>
</div>

<div class="analytics-card">
<div class="analytics-title">Emission Reduction Potential</div>
<div id="reduction-ai" class="analytics-value">Loading...</div>
</div>

<div class="analytics-card">
<div class="analytics-title">Cost Saving Opportunity</div>
<div id="saving-ai" class="analytics-value">Loading...</div>
</div>

</div>

<div class="chart-card">
<h3>Energy Type Comparison</h3>
<div style="font-size:28px;font-weight:600;margin-bottom:10px" id="energy-total">0</div>
<canvas id="stackedChart"></canvas>
</div>

<div class="chart-card">
<h3>Emission Trend</h3>
<canvas id="trendChart"></canvas>
</div>

<div class="chart-card">
<h3>Facility Comparison</h3>
<canvas id="facilityChart"></canvas>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<script type="module" src="script.js"></script>

</body>
</html>

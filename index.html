<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Helixon Energy Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

#kpi-container{
display:flex;
gap:20px;
margin-bottom:30px;
}

.kpi-card{
background:#1e293b;
padding:20px;
border-radius:10px;
min-width:150px;
}

.chart-box{
background:#1e293b;
padding:20px;
margin-bottom:30px;
border-radius:10px;
}

canvas{
max-width:100%;
}

</style>

</head>

<body>

<h1>Helixon Energy Intelligence</h1>

<div id="loading">Loading data...</div>

<div id="kpi-container"></div>

<div class="chart-box">
<canvas id="stackedChart"></canvas>
</div>

<div class="chart-box">
<canvas id="trendChart"></canvas>
</div>

<script type="module" src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Helixon Energy Intelligence</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

</head>
<body>

<h1>Helixon Energy Intelligence</h1>

<div id="loading">Loading data...</div>

<div id="dashboard-filters" style="display:flex; gap:20px; align-items:flex-end; margin-bottom:20px; flex-wrap:wrap; font-family:'Montserrat';">

  <!-- Facility Multi-Select -->
  <div style="display:flex; flex-direction:column;">
    <label for="facility-select" style="font-weight:600; font-size:14px; color:white;">Select Facility(s)</label>
    <select id="facility-select" multiple style="padding:8px 12px; border-radius:8px; border:1px solid #ddd; font-size:14px; color:#111; background:#fff; min-width:180px; height:90px;">
      <!-- Options will be populated dynamically -->
    </select>
    <small style="color:#aaa; font-size:12px;">Hold Ctrl / Cmd to select multiple</small>
  </div>

  <!-- Month Selector -->
  <div style="display:flex; flex-direction:column;">
    <label for="month-select" style="font-weight:600; font-size:14px; color:white;">Select Month</label>
    <select id="month-select" style="padding:8px 12px; border-radius:8px; border:1px solid #ddd; font-size:14px; color:#111; background:#fff; min-width:140px;">
      <!-- Options populated dynamically -->
    </select>
  </div>

  <!-- Export KPI -->
  <div style="display:flex; flex-direction:column; justify-content:flex-end;">
    <button id="export-kpi" style="padding:10px 16px; border-radius:8px; border:none; font-weight:600; background:#4F46E5; color:white; font-size:14px; cursor:pointer; transition:0.2s;">
      Export KPI Data
    </button>
  </div>

</div>

<div id="kpi-container" class="kpi-container"></div>

<div class="carbon-box">
<h3>Carbon Price Tracker</h3>
<div class="carbon-price">$85 / tCO₂</div>
<div>EU ETS benchmark</div>
</div>

<div class="chart-container">
<h3>Energy Type Comparison</h3>
<canvas id="stackedChart"></canvas>
</div>

<div class="chart-container">
<h3>Emission Trend</h3>
<canvas id="trendChart"></canvas>
</div>

<div class="ai-panel">
<h3>AI Energy Recommendation</h3>
<div id="ai-recommend"></div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>

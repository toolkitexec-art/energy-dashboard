<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Energy Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Inter,Arial;
background:#07131d;
color:#e6f1f5;
display:flex;
}

.sidebar{
width:70px;
background:#0b1a25;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:25px
}

.sidebar div{
width:36px;
height:36px;
background:#0f2b3a;
border-radius:10px
}

.main{
flex:1;
padding:25px
}

.header{
font-size:22px;
font-weight:600;
margin-bottom:20px
}

.kpi-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:20px
}

.kpi-card{
background:#0f2330;
border-radius:14px;
padding:18px
}

.kpi-title{
font-size:13px;
opacity:.7
}

.kpi-value{
font-size:28px;
margin-top:5px
}

.chart-grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:18px
}

.chart-card{
background:#0f2330;
border-radius:16px;
padding:18px
}

canvas{
background:#0c1c27;
border-radius:10px
}

</style>
</head>

<body>

<div class="sidebar">
<div></div>
<div></div>
<div></div>
<div></div>
<div></div>
</div>

<div class="main">

<div class="header">Energy Dashboard</div>

<div id="loading">Loading data...</div>

<div id="kpi-container" class="kpi-grid"></div>

<div class="chart-grid">

<div class="chart-card">
<h3>Monthly Usage</h3>
<canvas id="trendChart"></canvas>
</div>

<div class="chart-card">
<h3>Energy Mix</h3>
<canvas id="mixChart"></canvas>
</div>

</div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>

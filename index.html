<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Helixon Energy Intelligence</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

</head>

<body>

<h1>Helixon Energy Intelligence</h1>

<div id="loading">Loading data...</div>

<div class="filters">

<div class="filter-box">
<label>Select Facility</label>
<select id="facility-select">
<option value="all">All Facilities</option>
</select>
</div>

<div class="filter-box">
<label>Select Month</label>
<select id="month-select">
<option value="all">All Months</option>
</select>
</div>

</div>

<div id="kpi-container" class="kpi-container"></div>

<div class="analytics-row">

<div class="analytics-card">
<h3>Industry Benchmark</h3>
<div id="benchmark-value"></div>
</div>

<div class="analytics-card">
<h3>Energy Efficiency Score</h3>
<div id="efficiency-score"></div>
</div>

<div class="analytics-card">
<h3>Emission Reduction Potential</h3>
<div id="reduction-ai"></div>
</div>

<div class="analytics-card">
<h3>Cost Saving Opportunity</h3>
<div id="saving-ai"></div>
</div>

</div>

<div class="carbon-box">
<h3>Carbon Price Tracker</h3>
<div class="carbon-price">$85 / tCO₂</div>
<div id="carbon-impact"></div>
</div>

<div class="chart-container">

<h3>Energy Type Comparison</h3>

<div class="big-energy-number">
<span id="energy-total">0</span> tCO₂
</div>

<canvas id="stackedChart"></canvas>

</div>

<div class="chart-container">
<h3>Emission Trend</h3>
<canvas id="trendChart"></canvas>
</div>

<div class="chart-container">
<h3>Facility Comparison</h3>
<canvas id="facilityChart"></canvas>
</div>

<div class="ai-panel">
<h3>AI Energy Recommendation</h3>
<div id="ai-recommend"></div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>

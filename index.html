<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Dashboard - Enterprise</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 1rem;
    background-color: #121212;
    color: #f0f0f0;
    transition: background-color 0.3s, color 0.3s;
  }
  header {
    display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;
  }
  header img { height:50px; }
  .controls { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1rem; }
  select, button { padding:0.5rem; border-radius:6px; border:1px solid #ccc; background:#1e1e1e; color:#f0f0f0; }
  select option { background:#1e1e1e; color:#f0f0f0; }
  .kpi-container { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1rem; }
  .kpi-card { flex:1; min-width:150px; border-radius:8px; padding:1rem; text-align:center; background:#1e1e1e; transition: background 0.3s, color 0.3s; box-shadow:0 0 10px rgba(0,0,0,0.3); }
  canvas { max-width:100%; height:auto; margin-bottom:1rem; background:#1e1e1e; border-radius:8px; padding:10px; }
</style>
</head>

<body>
<header>
  <h1>Energy Emission Dashboard</h1>
  <img src="https://placehold.co/100x50?text=Logo" alt="Company Logo">
</header>

<div class="controls">
  <label>Facility:
    <select id="facilityFilter" multiple></select>
  </label>
  <label>Month:
    <select id="monthFilter" multiple></select>
  </label>
  <button id="toggleTheme">Toggle Light/Dark</button>
  <button id="exportCSV">Export CSV</button>
  <button id="exportPDF">Export PDF</button>
</div>

<div class="kpi-container" id="kpi-container"></div>

<h2>Stacked Chart: Emission per Energy Type</h2>
<canvas id="stackedChart"></canvas>

<h2>Trend Line: Total Emission per Month</h2>
<canvas id="trendChart"></canvas>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = "https://otzxkvdkpbsyrbiqtbjd.supabase.co"
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90enhrdmRrcGJzeXJiaXF0YmpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1NTY3NDYsImV4cCI6MjA4NzEzMjc0Nn0.tmLk2MoEpRbAdZNT5tRZTRvH_laeRo5Y1t-ollBGNAQ"

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

let stackedChart, trendChart
let allData = []

const energyColors = {
  electricity:'#1f77b4', diesel:'#ff7f0e', natural_gas:'#2ca02c', coal:'#d62728',
  lpg:'#9467bd', solar:'#8c564b', biomass:'#e377c2'
}

// --- Load Data ---
async function loadData() {
  const { data, error } = await supabase
    .from("dashboard_phase2_final_named")
    .select("*")
    .order('facility_name_display', { ascending:true })

  if(error){ console.error(error); return }
  allData = data

  populateFilters()
  renderDashboard()
}

// --- Filters ---
function populateFilters() {
  const facilitySelect = document.getElementById('facilityFilter')
  const monthSelect = document.getElementById('monthFilter')

  const facilities = [...new Set(allData.map(d=>d.facility_name_display))]
  const months = [...new Set(allData.map(d=>d.month))]

  facilitySelect.innerHTML = facilities.map(f=>`<option value="${f}" selected>${f}</option>`).join('')
  monthSelect.innerHTML = months.map(m=>`<option value="${m}" selected>${m}</option>`).join('')
}

// --- Render Dashboard ---
function renderDashboard() {
  const selectedFacilities = Array.from(document.getElementById('facilityFilter').selectedOptions).map(o=>o.value)
  const selectedMonths = Array.from(document.getElementById('monthFilter').selectedOptions).map(o=>o.value)

  const filtered = allData.filter(d => selectedFacilities.includes(d.facility_name_display) && selectedMonths.includes(d.month))
  renderKPI(filtered)
  renderStack(filtered)
  renderTrend(filtered)
}

// --- KPI Cards ---
function renderKPI(data) {
  const container = document.getElementById('kpi-container')
  const totalUsage = data.reduce((sum,r)=>sum+r.total_usage_facility,0)
  const totalCost = data.reduce((sum,r)=>sum+r.total_cost_facility,0)
  const totalEmission = data.reduce((sum,r)=>sum+r.total_emission_facility,0)

  container.innerHTML = `
    <div class="kpi-card">Total Usage<br>${totalUsage.toFixed(2)}</div>
    <div class="kpi-card">Total Cost<br>${totalCost.toFixed(2)}</div>
    <div class="kpi-card">Total Emission<br>${totalEmission.toFixed(2)}</div>
  `
}

// --- Stacked Chart ---
function renderStack(data){
  const energyTypes = Object.keys(energyColors)
  const facilities = [...new Set(data.map(d=>d.facility_name_display))]
  const datasets = energyTypes.map(type=>{
    return {
      label:type,
      data:facilities.map(f=>{
        const row = data.find(d=>d.facility_name_display===f && d.energy_type_record===type)
        return row?row.total_emission:0
      }),
      backgroundColor: energyColors[type]
    }
  })
  if(stackedChart) stackedChart.destroy()
  stackedChart = new Chart(document.getElementById('stackedChart'),{
    type:'bar',
    data:{ labels:facilities, datasets:datasets },
    options:{
      responsive:true,
      plugins:{ legend:{position:'top'} },
      scales:{ x:{ stacked:true }, y:{ stacked:true } },
      animation:{ duration:800, easing:'easeOutQuart' }
    }
  })
}

// --- Trend Chart ---
function renderTrend(data){
  const months = [...new Set(data.map(d=>d.month))]
  const facilities = [...new Set(data.map(d=>d.facility_name_display))]
  const datasets = facilities.map((f,i)=>({
    label:f,
    data: months.map(m=>{
      return data.filter(d=>d.facility_name_display===f && d.month===m).reduce((sum,r)=>sum+r.total_emission,0)
    }),
    borderColor:Object.values(energyColors)[i%Object.keys(energyColors).length],
    fill:false
  }))
  if(trendChart) trendChart.destroy()
  trendChart = new Chart(document.getElementById('trendChart'),{
    type:'line',
    data:{ labels:months, datasets:datasets },
    options:{ responsive:true, animation:{ duration:800, easing:'easeOutQuart' } }
  })
}

// --- Light/Dark Toggle ---
document.getElementById('toggleTheme').addEventListener('click',()=>{
  document.body.classList.toggle('dark')
})

// --- Export CSV ---
document.getElementById('exportCSV').addEventListener('click',()=>{
  if(!allData.length) return
  const csv = [
    Object.keys(allData[0]).join(','),
    ...allData.map(r=>Object.values(r).join(','))
  ].join('\n')
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' })
  saveAs(blob, 'dashboard_data.csv')
})

// --- Export PDF ---
document.getElementById('exportPDF').addEventListener('click',()=>{
  const { jsPDF } = window.jspdf
  const pdf = new jsPDF()
  pdf.text("Energy Dashboard",10,10)
  pdf.html(document.body, {
    callback: function(doc){
      doc.save('dashboard.pdf')
    },
    x:10,
    y:20,
    width:180
  })
})

// --- Filter Change ---
document.getElementById('facilityFilter').addEventListener('change', renderDashboard)
document.getElementById('monthFilter').addEventListener('change', renderDashboard)

// --- Initial Load ---
loadData()
setInterval(loadData, 10000) // auto-refresh setiap 10 detik
</script>
</body>
</html>

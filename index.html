<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Helixon Energy Intelligence</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

</head>
<body>

<h1>Helixon Energy Intelligence</h1>

<div id="loading">Loading data...</div>

<div id="dashboard-filters" class="filters">

  <!-- Facility Multi-Select -->
  <div class="filter-box">
    <label for="facility-select">Select Facility(s)</label>
    <select id="facility-select" multiple>
      <option value="all" selected>All Facilities</option>
    </select>
    <small>Hold Ctrl / Cmd to select multiple</small>
  </div>

  <!-- Month Selector -->
  <div class="filter-box">
    <label for="month-select">Select Month</label>
    <select id="month-select"></select>
  </div>

  <!-- Export KPI -->
  <div class="filter-box">
    <button id="export-kpi">Export KPI Data</button>
  </div>

</div>

<div id="kpi-container" class="kpi-container"></div>

<div class="carbon-box">
<h3>Carbon Price Tracker</h3>
<div class="carbon-price">$85 / tCO₂</div>
<div>EU ETS benchmark</div>
</div>

<div class="chart-container">
<h3>Energy Type Comparison</h3>
<canvas id="stackedChart"></canvas>
</div>

<div class="chart-container">
<h3>Emission Trend</h3>
<canvas id="trendChart"></canvas>
</div>

<div class="ai-panel">
<h3>AI Energy Recommendation</h3>
<div id="ai-recommend"></div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>

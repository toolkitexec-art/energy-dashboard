<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Helixon Carbon Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>

</head>

<body>

<!-- HEADER -->

<div class="header">

<img src="logo-helixon.png">

<h2>Helixon Carbon Intelligence</h2>

</div>


<!-- EXPORT BUTTON -->

<button onclick="exportPDF()" class="export-btn">
Export PDF Report
</button>


<!-- FILTERS -->

<div class="filters">

<select id="facility-select">
<option value="all">All Facilities</option>
</select>

<select id="month-select">
<option value="all">All Months</option>
</select>

</div>


<!-- KPI SECTION (VERTICAL FIX) -->

<div style="max-width:400px">

<div id="kpi-container"></div>

</div>


<!-- ANALYTICS PANEL (HORIZONTAL) -->

<div class="analytics-grid">

<div class="analytics-card">

<h4>Industry Benchmark</h4>

<div id="benchmark-value"></div>

</div>

<div class="analytics-card">

<h4>Energy Efficiency Score</h4>

<div id="efficiency-score"></div>

</div>

<div class="analytics-card">

<h4>Emission Reduction Potential</h4>

<div id="reduction-ai"></div>

</div>

<div class="analytics-card">

<h4>Cost Saving Opportunity</h4>

<div id="saving-ai"></div>

</div>

</div>


<!-- ENERGY TYPE -->

<h3>
Energy Type Comparison
<span id="energy-total"></span>
</h3>

<canvas id="stackedChart"></canvas>


<!-- EMISSION TREND -->

<h3>Emission Trend</h3>

<canvas id="trendChart"></canvas>


<!-- FACILITY COMPARISON -->

<h3>Facility Emissions</h3>

<canvas id="facilityChart"></canvas>


<script src="script.js"></script>


<!-- PDF EXPORT -->

<script>

function exportPDF(){

const pdf=new jspdf.jsPDF()

pdf.text("Helixon Carbon Report",20,20)

pdf.text("Generated from dashboard",20,30)

pdf.save("helixon-report.pdf")

}

</script>

</body>

</html>

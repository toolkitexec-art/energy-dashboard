<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Helixon Energy Intelligence</title>

<link rel="stylesheet" href="style.css">

<style>

.header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:20px;
}

.header img{
width:40px;
height:40px;
}

.filters{
display:flex;
gap:15px;
margin-bottom:25px;
}

#kpi-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
margin-bottom:25px;
}

.analytics-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
margin-bottom:30px;
}

.analytics-card{
padding:20px;
border-radius:14px;
background:linear-gradient(135deg,#0f172a,#020617);
border:1px solid #334155;
font-size:15px;
}

</style>

</head>

<body>

<div class="header">
<img src="logo-helixon.png">
<h1>Helixon Energy Intelligence</h1>
</div>

<div class="filters">

<select id="facility-select">
<option value="all">All Facilities</option>
</select>

<select id="month-select">
<option value="all">All Months</option>
</select>

<button id="export-report">Export ESG Report</button>

</div>

<div id="kpi-container"></div>

<div class="analytics-grid">

<div class="analytics-card">
<div>Industry Benchmark</div>
<div id="benchmark-value"></div>
</div>

<div class="analytics-card">
<div>Energy Efficiency Score</div>
<div id="efficiency-score"></div>
</div>

<div class="analytics-card">
<div>Emission Reduction Potential</div>
<div id="reduction-ai"></div>
</div>

<div class="analytics-card">
<div>Cost Saving Opportunity</div>
<div id="saving-ai"></div>
</div>

</div>

<h3>Energy Type Comparison</h3>

<div id="energy-total" style="font-size:24px;margin-bottom:10px;"></div>

<canvas id="stackedChart"></canvas>

<h3>Emission Trend</h3>

<canvas id="trendChart"></canvas>

<h3>Facility Comparison</h3>

<canvas id="facilityChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<script type="module" src="script.js"></script>

<script>

document.getElementById("export-report").onclick=function(){

const facility=document.getElementById("facility-select").value
const month=document.getElementById("month-select").value

window.open(
`report.html?facility=${facility}&month=${month}`,
"_blank"
)

}

</script>

</body>
</html>

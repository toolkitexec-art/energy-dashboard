<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Energy Emission Premium Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const SUPABASE_URL = "https://otzxkvdkpbsyrbiqtbjd.supabase.co"
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90enhrdmRrcGJzeXJiaXF0YmpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1NTY3NDYsImV4cCI6MjA4NzEzMjc0Nn0.tmLk2MoEpRbAdZNT5tRZTRvH_laeRo5Y1t-ollBGNAQ"
const supabase = createClient(SUPABASE_URL,SUPABASE_ANON_KEY)
</script>
<style>
body{margin:0;font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0F2027,#203A43,#2C5364);color:#fff;}
.container{max-width:1400px;margin:auto;padding:20px;}
h1{text-align:center;margin-bottom:20px;}
.filters{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:30px;}
.filters select{padding:8px 12px;border-radius:8px;border:none;font-size:14px;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:40px;}
.kpi-card{background:linear-gradient(145deg,#1e1e1e,#2a2a2a);padding:20px;border-radius:16px;box-shadow:0 8px 20px rgba(0,0,0,0.5);text-align:center;transition:transform 0.3s;}
.kpi-card:hover{transform:translateY(-5px);}
.kpi-title{font-size:14px;color:#aaa;margin-bottom:8px;}
.kpi-value{font-size:28px;font-weight:700;color:#03DAC6;}
.chart-container{background:rgba(0,0,0,0.3);border-radius:16px;padding:20px;margin-bottom:40px;box-shadow:0 8px 20px rgba(0,0,0,0.5);}
canvas{background:rgba(255,255,255,0.05);border-radius:12px;}
.matrix-table{width:100%;border-collapse:collapse;margin-bottom:40px;}
.matrix-table th,.matrix-table td{padding:12px;text-align:center;border-radius:8px;color:#fff;}
.matrix-table th{background:rgba(255,255,255,0.1);}
.matrix-table td{background:rgba(255,255,255,0.05);transition:background 0.3s;}
.export-btn{padding:10px 20px;background:#03DAC6;color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:700;margin-bottom:20px;}
.export-btn:hover{background:#00bfa5;}
</style>
<body>
<div class="container">
<h1>Energy Emission Premium Dashboard</h1>

<div class="filters">
  <select id="facilityFilter"><option value="all">All Facilities</option></select>
  <select id="energyFilter"><option value="all">All Energy Types</option></select>
</div>

<div class="kpi-grid" id="kpiGrid"></div>

<div class="chart-container"><canvas id="stackedChart"></canvas></div>
<div class="chart-container"><canvas id="trendChart"></canvas></div>
<div class="chart-container"><canvas id="donutChart"></canvas></div>

<button class="export-btn" id="exportBtn">Export CSV</button>

<table class="matrix-table" id="matrixTable">
  <thead>
    <tr>
      <th>Facility</th>
      <th>Electricity</th>
      <th>Gas</th>
      <th>Diesel</th>
      <th>Renewables</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
const supabaseClient = createClient(SUPABASE_URL,SUPABASE_ANON_KEY)
let allData = [], stackedChart, trendChart, donutChart

async function loadData(){
  const { data,error } = await supabaseClient.from("dashboard_phase2_final_named").select("*")
  if(error){ console.error(error); return }
  allData = data
  populateFilters()
  renderDashboard()
}

function populateFilters(){
  const facilities = [...new Set(allData.map(d=>d.facility_id))]
  document.getElementById("facilityFilter").innerHTML = '<option value="all">All Facilities</option>'+facilities.map(f=>`<option value="${f}">${f}</option>`).join('')
  const energyTypes = [...new Set(allData.map(d=>d.energy_type_record))]
  document.getElementById("energyFilter").innerHTML = '<option value="all">All Energy Types</option>'+energyTypes.map(e=>`<option value="${e}">${e}</option>`).join('')
}

function renderDashboard(){
  const facilityFilter = document.getElementById("facilityFilter").value
  const energyFilter = document.getElementById("energyFilter").value
  const filtered = allData.filter(d=>(facilityFilter==='all'||d.facility_id===facilityFilter)&&(energyFilter==='all'||d.energy_type_record===energyFilter))
  renderKPI(filtered)
  renderStack(filtered)
  renderTrend(filtered)
  renderDonut(filtered)
  renderMatrix(filtered)
}

function renderKPI(data){
  const container = document.getElementById("kpiGrid")
  const totalUsage = data.reduce((sum,r)=>sum+Number(r.total_usage),0)
  const totalCost = data.reduce((sum,r)=>sum+Number(r.total_cost),0)
  const totalEmission = data.reduce((sum,r)=>sum+Number(r.total_emission),0)
  container.innerHTML = `
    <div class="kpi-card"><div class="kpi-title">Total Usage</div><div class="kpi-value">${totalUsage.toFixed(2)}</div></div>
    <div class="kpi-card"><div class="kpi-title">Total Cost</div><div class="kpi-value">${totalCost.toFixed(2)}</div></div>
    <div class="kpi-card"><div class="kpi-title">Total Emission</div><div class="kpi-value">${totalEmission.toFixed(2)}</div></div>
  `
}

function renderStack(data){
  const labels = [...new Set(data.map(d=>d.energy_type_record))]
  const values = labels.map(t=>data.filter(d=>d.energy_type_record===t).reduce((s,r)=>s+Number(r.total_emission),0))
  if(stackedChart) stackedChart.destroy()
  stackedChart = new Chart(document.getElementById("stackedChart"),{
    type:"bar",
    data:{labels,datasets:[{label:"Emission by Energy Type",data:values,backgroundColor:['#03DAC6','#BB86FC','#CF6679','#FFD700']}]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#fff'}},tooltip:{mode:'index',intersect:false}},scales:{x:{ticks:{color:'#fff'}},y:{ticks:{color:'#fff'}}}}
  })
}

function renderTrend(data){
  const months = [...new Set(data.map(d=>d.month.substring(0,7)))].sort()
  const values = months.map(m=>data.filter(r=>r.month.startsWith(m)).reduce((s,r)=>s+Number(r.total_emission),0))
  if(trendChart) trendChart.destroy()
  trendChart = new Chart(document.getElementById("trendChart"),{
    type:"line",
    data:{labels:months,datasets:[{label:"Total Emission",data:values,borderColor:"#03DAC6",backgroundColor:"rgba(3,218,198,0.2)",fill:true,tension:0.3}]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#fff'}},tooltip:{mode:'index',intersect:false}},scales:{x:{ticks:{color:'#fff'}},y:{ticks:{color:'#fff'}}}}
  })
}

function renderDonut(data){
  const facilities = [...new Set(data.map(d=>d.facility_id))]
  const values = facilities.map(f=>data.filter(d=>d.facility_id===f).reduce((s,r)=>s+Number(r.total_emission),0))
  if(donutChart) donutChart.destroy()
  donutChart = new Chart(document.getElementById("donutChart"),{
    type:'doughnut',
    data:{labels:facilities,datasets:[{data:values,backgroundColor:facilities.map((_,i)=>`hsl(${i*60},70%,50%)`)}]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#fff'}},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw.toFixed(2)}`}}}}
  })
}

function renderMatrix(data){
  const tbody = document.querySelector("#matrixTable tbody")
  const facilities = [...new Set(data.map(d=>d.facility_id))]
  const types = ['electricity','gas','diesel','renewables']
  tbody.innerHTML = facilities.map(f=>{
    return `<tr><td>${f}</td>` + types.map(t=>{
      const v = data.filter(d=>d.facility_id===f && d.energy_type_record===t).reduce((s,r)=>s+Number(r.total_emission),0)
      const colorPct = Math.min(v/1000*100,100)
      return `<td style="background:linear-gradient(to top,#03DAC6 ${colorPct}%,rgba(0,0,0,0.2) 0%)">${v.toFixed(2)}</td>`
    }).join('') + '</tr>'
  }).join('')
}

function exportCSV(){
  let csv = "Facility,Electricity,Gas,Diesel,Renewables\n"
  const facilities = [...new Set(allData.map(d=>d.facility_id))]
  const types = ['electricity','gas','diesel','renewables']
  facilities.forEach(f=>{
    const row = types.map(t=>allData.filter(d=>d.facility_id===f && d.energy_type_record===t).reduce((s,r)=>s+Number(r.total_emission),0))
    csv += `${f},${row.join(",")}\n`
  })
  const blob = new Blob([csv],{type:'text/csv'})
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a')
  a.href=url; a.download='energy_data.csv'; a.click()
  URL.revokeObjectURL(url)
}

document.getElementById("facilityFilter").addEventListener("change",renderDashboard)
document.getElementById("energyFilter").addEventListener("change",renderDashboard)
document.getElementById("exportBtn").addEventListener("click",exportCSV)

loadData()
setInterval(renderDashboard,10000)
</script>
</body>
</html>

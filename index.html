<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helixon Energy Intelligence</title>

<link rel="stylesheet" href="style.css">

<style>
/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:20px;
}

.header img{
  width:40px;
  height:40px;
}

/* FILTER */
.filters{
  display:flex;
  gap:15px;
  margin-bottom:25px;
}

/* KPI GRID */
#kpi-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  margin-bottom:25px;
}

/* ANALYTICS GRID */
.analytics-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  margin-bottom:30px;
}

/* ANALYTICS CARD */
.analytics-card{
  padding:20px;
  border-radius:14px;
  background:linear-gradient(135deg,#0f172a,#020617);
  border:1px solid #334155;
  font-size:15px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo-helixon.png">
  <h1>Helixon Energy Intelligence</h1>
</div>

<!-- FILTER -->
<div class="filters">
  <select id="facility-select">
    <option value="all">All Facilities</option>
  </select>
  <select id="month-select">
    <option value="all">All Months</option>
  </select>
</div>

<!-- KPI -->
<div id="kpi-container"></div>

<!-- ANALYTICS GRID -->
<div class="analytics-grid">
  <div class="analytics-card">
    <div>Industry Benchmark</div>
    <div id="benchmark-value"></div>
  </div>
  <div class="analytics-card">
    <div>Energy Efficiency Score</div>
    <div id="efficiency-score"></div>
  </div>
  <div class="analytics-card">
    <div>Emission Reduction Potential</div>
    <div id="reduction-ai"></div>
  </div>
  <div class="analytics-card">
    <div>Cost Saving Opportunity</div>
    <div id="saving-ai"></div>
  </div>
</div>

<!-- ENERGY TYPE -->
<h3>Energy Type Comparison</h3>
<div id="energy-total" style="font-size:24px;margin-bottom:10px;"></div>
<canvas id="stackedChart"></canvas>

<!-- TREND -->
<h3>Emission Trend</h3>
<canvas id="trendChart"></canvas>

<!-- FACILITY -->
<h3>Facility Comparison</h3>
<canvas id="facilityChart"></canvas>

<!-- LIBRARIES -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<!-- DASHBOARD SCRIPT -->
<script type="module" src="script.js"></script>

<!-- EXPORT BUTTON -->
<button onclick="exportPDF()" style="
    position:fixed;
    top:30px;
    right:40px;
    padding:10px 16px;
    border-radius:10px;
    border:1px solid #334155;
    background:linear-gradient(135deg,#3b82f6,#1e3a8a);
    color:white;
    font-weight:600;
    cursor:pointer;
    z-index:999;
">Export PDF</button>

<!-- EXPORT.JS -->
<script src="export.js"></script>

</body>
</html>

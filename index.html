<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Helixon Energy Intelligence</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>

<style>

/* EXPORT BUTTON */

.export-btn{

position:absolute;
right:40px;
top:40px;

background:linear-gradient(135deg,#2563eb,#1e3a8a);

border:none;

color:white;

padding:10px 18px;

border-radius:10px;

font-size:14px;

cursor:pointer;

box-shadow:0 6px 18px rgba(0,0,0,.4);

}

.export-btn:hover{

transform:translateY(-2px);

}

</style>

</head>

<body>

<button class="export-btn" onclick="exportPDF()">
Export Report
</button>


<div id="dashboard">

<!-- HEADER -->

<div class="header">

<img src="logo-helixon.png">

<h1>Helixon Energy Intelligence</h1>

</div>


<!-- FILTER -->

<div class="filters">

<select id="facility-select">
<option value="all">All Facilities</option>
</select>

<select id="month-select">
<option value="all">All Months</option>
</select>

</div>


<!-- KPI -->

<div id="kpi-container"></div>


<!-- ANALYTICS -->

<div class="analytics-grid">

<div class="analytics-card">
<div>Industry Benchmark</div>
<div id="benchmark-value"></div>
</div>

<div class="analytics-card">
<div>Energy Efficiency Score</div>
<div id="efficiency-score"></div>
</div>

<div class="analytics-card">
<div>Emission Reduction Potential</div>
<div id="reduction-ai"></div>
</div>

<div class="analytics-card">
<div>Cost Saving Opportunity</div>
<div id="saving-ai"></div>
</div>

</div>


<h3>Energy Type Comparison</h3>

<div id="energy-total"></div>

<canvas id="stackedChart"></canvas>


<h3>Emission Trend</h3>

<canvas id="trendChart"></canvas>


<h3>Facility Comparison</h3>

<canvas id="facilityChart"></canvas>

</div>


<script type="module" src="script.js"></script>


<script>

async function exportPDF(){

const dashboard=document.getElementById("dashboard")

const canvas=await html2canvas(dashboard,{scale:2})

const img=canvas.toDataURL("image/png")

const pdf=new jspdf.jsPDF("p","mm","a4")

const width=210
const height=(canvas.height*width)/canvas.width

pdf.addImage(img,"PNG",0,0,width,height)

pdf.save("helixon-energy-report.pdf")

}

</script>

</body>

</html>

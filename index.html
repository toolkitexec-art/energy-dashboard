<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helixon Carbon Premium Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
<style>
  body { margin:0; font-family:'Inter',sans-serif; background:linear-gradient(135deg,#0F2027,#203A43,#2C5364); color:#fff; }
  .container { max-width:1400px; margin:auto; padding:20px; }
  h1 { text-align:center; margin-bottom:20px; font-size:32px; }

  /* Filters */
  .filters { display:flex; gap:20px; margin-bottom:30px; flex-wrap:wrap; }
  .filters select { padding:8px 12px; border-radius:8px; border:none; font-size:14px; }

  /* KPI Grid */
  .kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; margin-bottom:40px; }
  .kpi-card { background:linear-gradient(145deg,#1e1e1e,#2a2a2a); border-radius:16px; padding:20px; box-shadow:0 8px 20px rgba(0,0,0,0.5); transition:transform 0.3s; }
  .kpi-card:hover { transform:translateY(-5px); }
  .kpi-title { font-size:14px; color:#aaa; margin-bottom:8px; }
  .kpi-value { font-size:28px; font-weight:700; color:#03DAC6; }

  /* Chart Container */
  .chart-container { background:rgba(0,0,0,0.3); border-radius:16px; padding:20px; margin-bottom:40px; box-shadow:0 8px 20px rgba(0,0,0,0.5); }
  canvas { background:rgba(255,255,255,0.05); border-radius:12px; }

  /* Matrix Table */
  .matrix-table { width:100%; border-collapse:collapse; margin-bottom:40px; }
  .matrix-table th, .matrix-table td { padding:12px; text-align:center; border-radius:8px; color:#fff; }
  .matrix-table th { background:rgba(255,255,255,0.1); }
  .matrix-table td { background:rgba(255,255,255,0.05); transition:background 0.3s; }

  /* Export Button */
  .export-btn { padding:10px 20px; background:#03DAC6; color:#000; border:none; border-radius:8px; cursor:pointer; font-weight:700; margin-bottom:20px; }
  .export-btn:hover { background:#00bfa5; }
</style>
</head>
<body>
<div class="container">
  <h1>Helixon Carbon Premium Dashboard</h1>

  <!-- Filters -->
  <div class="filters">
    <select id="facilityFilter"><option value="all">All Facilities</option></select>
    <select id="energyFilter"><option value="all">All Energy Types</option></select>
  </div>

  <!-- KPI -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- Charts -->
  <div class="chart-container"><canvas id="lineChart"></canvas></div>
  <div class="chart-container"><canvas id="barChart"></canvas></div>
  <div class="chart-container"><canvas id="donutChart"></canvas></div>

  <!-- Matrix Table -->
  <button class="export-btn" id="exportBtn">Export CSV</button>
  <table class="matrix-table" id="matrixTable">
    <thead>
      <tr>
        <th>Facility</th>
        <th>Electricity</th>
        <th>Gas</th>
        <th>Diesel</th>
        <th>Renewables</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const SUPABASE_URL = 'https://otzxkvdkpbsyrbiqtbjd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJzdXBhYmFzYSIsInJlZiI6Im90enhrdmRrcGJzeXJiaXF0YmpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1NTY3NDYsImV4cCI6MjA4NzEzMjc0Nn0.tmLk2MoEpRbAdZNT5tRZTRvH_laeRo5Y1t-ollBGNAQ';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let lineChart, barChart, donutChart;
let allData = [];

// ===== Load Data =====
async function loadData(){
  const { data, error } = await supabase.from('energy_data').select('*');
  if(error){ console.error(error); return; }
  allData = data;
  populateFilters();
  renderDashboard();
}

// ===== Populate Filters =====
function populateFilters(){
  const facilities = [...new Set(allData.map(d=>d.facility_id))];
  const facilitySelect = document.getElementById('facilityFilter');
  facilitySelect.innerHTML = '<option value="all">All Facilities</option>' + facilities.map(f=>`<option value="${f}">${f}</option>`).join('');

  const energyTypes = [...new Set(allData.map(d=>d.energy_type))];
  const energySelect = document.getElementById('energyFilter');
  energySelect.innerHTML = '<option value="all">All Energy Types</option>' + energyTypes.map(e=>`<option value="${e}">${e}</option>`).join('');
}

// ===== Render Dashboard =====
function renderDashboard(){
  const facilityFilter = document.getElementById('facilityFilter').value;
  const energyFilter = document.getElementById('energyFilter').value;

  const filtered = allData.filter(d=>{
    return (facilityFilter==='all'||d.facility_id===facilityFilter) &&
           (energyFilter==='all'||d.energy_type===energyFilter);
  });

  // --- KPI ---
  const totalCost = filtered.reduce((sum,i)=>sum+parseFloat(i.total_cost||0),0);
  const types = ['electricity','gas','diesel','renewables'];
  const kpis = [
    {title:'Total Cost', value:`$${totalCost.toLocaleString()}`},
    ...types.map(t=>{
      const v = filtered.filter(i=>i.energy_type===t).reduce((s,i)=>s+parseFloat(i.total_cost||0),0);
      return {title:`${t.charAt(0).toUpperCase()+t.slice(1)} Cost`, value:`$${v.toLocaleString()}`}
    }),
    {title:'Records', value:filtered.length}
  ];
  const kpiGrid = document.getElementById('kpiGrid');
  kpiGrid.innerHTML = kpis.map(k=>`
    <div class="kpi-card">
      <div class="kpi-title">${k.title}</div>
      <div class="kpi-value">${k.value}</div>
    </div>`).join('');

  // --- Charts ---
  // Line chart per month
  const monthlyData = {};
  filtered.forEach(i=>{ monthlyData[i.month]=(monthlyData[i.month]||0)+parseFloat(i.total_cost||0); });
  const months = Object.keys(monthlyData).sort();
  const monthValues = months.map(m=>monthlyData[m]);
  if(lineChart) lineChart.destroy();
  lineChart = new Chart(document.getElementById('lineChart').getContext('2d'),{
    type:'line',
    data:{labels:months,datasets:[{label:'Total Cost', data:monthValues, borderColor:'#03DAC6', backgroundColor:'rgba(3,218,198,0.2)', tension:0.3, fill:true}]},
    options:{responsive:true, plugins:{legend:{labels:{color:'#fff'}}}, scales:{x:{ticks:{color:'#fff'}},y:{ticks:{color:'#fff'}}}}
  });

  // Bar chart per energy type
  const typeValues = types.map(t=>filtered.filter(i=>i.energy_type===t).reduce((s,i)=>s+parseFloat(i.total_cost||0),0));
  if(barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('barChart').getContext('2d'),{
    type:'bar',
    data:{labels:types,datasets:[{label:'Cost', data:typeValues, backgroundColor:['#03DAC6','#BB86FC','#CF6679','#FFD700']}]},
    options:{responsive:true, plugins:{legend:{labels:{color:'#fff'}}}, scales:{x:{ticks:{color:'#fff'}},y:{ticks:{color:'#fff'}}}}
  });

  // Donut chart per facility
  const facilities = [...new Set(filtered.map(d=>d.facility_id))];
  const facilityValues = facilities.map(f=>filtered.filter(d=>d.facility_id===f).reduce((s,i)=>s+parseFloat(i.total_cost||0),0));
  if(donutChart) donutChart.destroy();
  donutChart = new Chart(document.getElementById('donutChart').getContext('2d'),{
    type:'doughnut',
    data:{labels:facilities,datasets:[{data:facilityValues, backgroundColor:facilities.map((_,i)=>`hsl(${i*60},70%,50%)`)}]},
    options:{responsive:true, plugins:{legend:{labels:{color:'#fff'}}}}
  });

  // --- Matrix Table ---
  const tbody = document.querySelector('#matrixTable tbody');
  tbody.innerHTML = facilities.map(f=>{
    return `<tr>
      <td>${f}</td>
      ${types.map(t=>{
        const v = filtered.filter(d=>d.facility_id===f && d.energy_type===t).reduce((s,i)=>s+parseFloat(i.total_cost||0),0);
        return `<td style="background:linear-gradient(to top,#03DAC6 ${v/1000*100}%,rgba(0,0,0,0.2) 0%)">$${v.toLocaleString()}</td>`
      }).join('')}
    </tr>`;
  }).join('');
}

// ===== Export CSV =====
function exportCSV(){
  let csv = 'Facility,Electricity,Gas,Diesel,Renewables\n';
  const facilities = [...new Set(allData.map(d=>d.facility_id))];
  const types = ['electricity','gas','diesel','renewables'];
  facilities.forEach(f=>{
    const row = types.map(t=>{
      const v = allData.filter(d=>d.facility_id===f && d.energy_type===t).reduce((s,i)=>s+parseFloat(i.total_cost||0),0);
      return v;
    });
    csv += `${f},${row.join(',')}\n`;
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='energy_data.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ===== Event Listeners =====
document.getElementById('facilityFilter').addEventListener('change', renderDashboard);
document.getElementById('energyFilter').addEventListener('change', renderDashboard);
document.getElementById('exportBtn').addEventListener('click', exportCSV);

// ===== Auto-refresh =====
loadData();
setInterval(renderDashboard, 10000);
</script>
</body>
</html>

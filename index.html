<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Helixon Energy Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Montserrat;
background:#0b1220;
color:white;
}

.dashboard{
padding:30px;
max-width:1500px;
margin:auto;
}

.logo{
font-size:28px;
font-weight:600;
}

.subtitle{
opacity:.6;
margin-bottom:20px;
}

.filters{
display:flex;
gap:10px;
margin-bottom:20px;
}

select{
padding:8px;
border-radius:6px;
border:none;
}

.kpi-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.kpi-card{
background:#121a2b;
padding:20px;
border-radius:10px;
}

.kpi-title{
font-size:14px;
opacity:.6;
}

.kpi-value{
font-size:26px;
font-weight:600;
margin-top:8px;
}

.charts-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.panel{
background:#121a2b;
padding:20px;
border-radius:10px;
}

h3{
margin-top:0;
font-size:16px;
opacity:.8;
}

canvas{
max-width:100%;
}

button{
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

pre{
background:#0f172a;
padding:10px;
border-radius:6px;
margin-top:10px;
}

#loading{
opacity:.6;
margin-top:20px;
}

</style>

</head>

<body>

<div class="dashboard">

<div class="logo">HELIXON</div>
<div class="subtitle">Energy Intelligence Platform</div>

<div class="filters">

<select id="facilityFilter"></select>

<select id="energyFilter">
<option value="all">All Energy Types</option>
</select>

</div>

<section id="kpi-container" class="kpi-grid"></section>

<section class="charts-grid">

<div class="panel">
<h3>Energy Emission Mix</h3>
<canvas id="mixChart"></canvas>
</div>

<div class="panel">
<h3>Emission Trend</h3>
<canvas id="trendChart"></canvas>
</div>

<div class="panel">
<h3>Energy Cost Breakdown</h3>
<canvas id="costChart"></canvas>
</div>

<div class="panel">
<h3>Carbon Intensity</h3>
<canvas id="intensityChart"></canvas>
</div>

<div class="panel">
<h3>Facility Emission Comparison</h3>
<canvas id="facilityChart"></canvas>
</div>

<div class="panel">
<h3>Energy Type Comparison</h3>
<canvas id="energyCompareChart"></canvas>
</div>

<div class="panel">
<h3>Energy Anomaly Detection</h3>
<canvas id="anomalyChart"></canvas>
</div>

<div class="panel">
<h3>Energy Forecast</h3>
<canvas id="forecastChart"></canvas>
</div>

<div class="panel">
<h3>Investor Analytics</h3>
<div id="investorPanel"></div>
</div>

<div class="panel">
<h3>Generate ESG Report</h3>
<button onclick="generateESG()">Generate ESG Summary</button>
<pre id="esgOutput"></pre>
</div>

</section>

<div id="loading">Loading data...</div>

</div>


<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const SUPABASE_URL="https://otzxkvdkpbsyrbiqtbjd.supabase.co"
const SUPABASE_KEY="sb_publishable_r5rzVpoDYvd3TkrseKi4jw_QnE-Ekvx"

const supabase=createClient(SUPABASE_URL,SUPABASE_KEY)

let charts={}
let rawData=[]

async function loadDashboard(){

const {data,error}=await supabase
.from("dashboard_phase2_final_named")
.select("*")

if(error){
console.log(error)
document.getElementById("loading").innerText="Error loading data"
return
}

if(!data || data.length===0){
document.getElementById("loading").innerText="No data found"
return
}

rawData=data

initFacilityFilter(data)
initEnergyFilter(data)

updateDashboard(data)

document.getElementById("loading").style.display="none"

}

function initFacilityFilter(data){

const facilities=[...new Set(data.map(d=>d.facility_name_display))]

const select=document.getElementById("facilityFilter")

select.innerHTML='<option value="all">All Facilities</option>'

facilities.forEach(f=>{
select.innerHTML+=`<option value="${f}">${f}</option>`
})

select.addEventListener("change",applyFilters)

}

function initEnergyFilter(data){

const types=[...new Set(data.map(d=>d.energy_type_record))]

const select=document.getElementById("energyFilter")

types.forEach(t=>{
select.innerHTML+=`<option value="${t}">${t}</option>`
})

select.addEventListener("change",applyFilters)

}

function applyFilters(){

let filtered=rawData

const facility=document.getElementById("facilityFilter").value
const energy=document.getElementById("energyFilter").value

if(facility!=="all"){
filtered=filtered.filter(d=>d.facility_name_display===facility)
}

if(energy!=="all"){
filtered=filtered.filter(d=>d.energy_type_record===energy)
}

updateDashboard(filtered)

}

function updateDashboard(data){

renderKPI(data)
renderMix(data)
renderTrend(data)
renderCost(data)
renderIntensity(data)
renderFacility(data)
renderEnergyCompare(data)
renderAnomaly(data)
renderForecast(data)
renderInvestor(data)

}

function renderKPI(data){

const totalUsage=data.reduce((s,r)=>s+Number(r.total_usage),0)
const totalCost=data.reduce((s,r)=>s+Number(r.total_cost),0)
const totalEmission=data.reduce((s,r)=>s+Number(r.total_emission),0)

document.getElementById("kpi-container").innerHTML=`

<div class="kpi-card">
<div class="kpi-title">Energy Usage</div>
<div class="kpi-value">${totalUsage.toFixed(0)}</div>
</div>

<div class="kpi-card">
<div class="kpi-title">Energy Cost</div>
<div class="kpi-value">$${totalCost.toFixed(0)}</div>
</div>

<div class="kpi-card">
<div class="kpi-title">Carbon Emission</div>
<div class="kpi-value">${totalEmission.toFixed(2)}</div>
</div>

`

}

function renderMix(data){

if(charts.mix) charts.mix.destroy()

const labels=[...new Set(data.map(d=>d.energy_type_record))]

const values=labels.map(type=>{
return data.filter(r=>r.energy_type_record===type)
.reduce((s,r)=>s+Number(r.total_emission),0)
})

charts.mix=new Chart(document.getElementById("mixChart"),{
type:"bar",
data:{labels:labels,datasets:[{label:"Emission",data:values}]}
})

}

function renderTrend(data){

if(charts.trend) charts.trend.destroy()

const months=[...new Set(data.map(d=>d.month.substring(0,7)))]

const values=months.map(m=>{
return data.filter(r=>r.month.startsWith(m))
.reduce((s,r)=>s+Number(r.total_emission),0)
})

charts.trend=new Chart(document.getElementById("trendChart"),{
type:"line",
data:{labels:months,datasets:[{label:"Emission",data:values}]}
})

}

function renderCost(data){

if(charts.cost) charts.cost.destroy()

const labels=[...new Set(data.map(d=>d.energy_type_record))]

const values=labels.map(type=>{
return data.filter(r=>r.energy_type_record===type)
.reduce((s,r)=>s+Number(r.total_cost),0)
})

charts.cost=new Chart(document.getElementById("costChart"),{
type:"pie",
data:{labels:labels,datasets:[{data:values}]}
})

}

function renderIntensity(data){

if(charts.intensity) charts.intensity.destroy()

const months=[...new Set(data.map(d=>d.month.substring(0,7)))]

const values=months.map(m=>{

const usage=data.filter(r=>r.month.startsWith(m))
.reduce((s,r)=>s+Number(r.total_usage),0)

const emission=data.filter(r=>r.month.startsWith(m))
.reduce((s,r)=>s+Number(r.total_emission),0)

return emission/usage

})

charts.intensity=new Chart(document.getElementById("intensityChart"),{
type:"line",
data:{labels:months,datasets:[{label:"Carbon Intensity",data:values}]}
})

}

function renderFacility(data){

if(charts.facility) charts.facility.destroy()

const facilities=[...new Set(data.map(d=>d.facility_name_display))]

const values=facilities.map(f=>{
return data.filter(r=>r.facility_name_display===f)
.reduce((s,r)=>s+Number(r.total_emission),0)
})

charts.facility=new Chart(document.getElementById("facilityChart"),{
type:"bar",
data:{labels:facilities,datasets:[{label:"Emission",data:values}]}
})

}

function renderEnergyCompare(data){

if(charts.compare) charts.compare.destroy()

const types=[...new Set(data.map(d=>d.energy_type_record))]

const usage=types.map(type=>{
return data.filter(r=>r.energy_type_record===type)
.reduce((s,r)=>s+Number(r.total_usage),0)
})

const emission=types.map(type=>{
return data.filter(r=>r.energy_type_record===type)
.reduce((s,r)=>s+Number(r.total_emission),0)
})

charts.compare=new Chart(document.getElementById("energyCompareChart"),{
type:"bar",
data:{
labels:types,
datasets:[
{label:"Usage",data:usage},
{label:"Emission",data:emission}
]
}
})

}

function renderAnomaly(data){

if(charts.anomaly) charts.anomaly.destroy()

const months=[...new Set(data.map(d=>d.month.substring(0,7)))]

const values=months.map(m=>{
return data.filter(r=>r.month.startsWith(m))
.reduce((s,r)=>s+Number(r.total_usage),0)
})

const avg=values.reduce((a,b)=>a+b,0)/values.length

const anomaly=values.map(v=>{
if(v>avg*1.5) return v
return null
})

charts.anomaly=new Chart(document.getElementById("anomalyChart"),{
type:"line",
data:{
labels:months,
datasets:[
{label:"Usage",data:values},
{label:"Anomaly",data:anomaly,pointRadius:6}
]
}
})

}

function renderForecast(data){

if(charts.forecast) charts.forecast.destroy()

const months=[...new Set(data.map(d=>d.month.substring(0,7)))]

const values=months.map(m=>{
return data.filter(r=>r.month.startsWith(m))
.reduce((s,r)=>s+Number(r.total_usage),0)
})

const forecast=[]

for(let i=0;i<values.length;i++){
let trend=i*(values[values.length-1]-values[0])/values.length
forecast.push(values[i]+trend)
}

charts.forecast=new Chart(document.getElementById("forecastChart"),{
type:"line",
data:{
labels:months,
datasets:[
{label:"Actual",data:values},
{label:"Forecast",data:forecast,borderDash:[5,5]}
]
}
})

}

function renderInvestor(data){

const totalCost=data.reduce((s,r)=>s+Number(r.total_cost),0)
const totalEmission=data.reduce((s,r)=>s+Number(r.total_emission),0)

document.getElementById("investorPanel").innerHTML=`

Energy Spend : $${totalCost.toFixed(0)}<br><br>
Carbon Liability Estimate : ${(totalEmission*50).toFixed(0)} USD

`

}

window.generateESG=function(){

const report=`

HELIXON ESG ENERGY REPORT

Energy Consumption Overview
Carbon Emissions
Energy Efficiency
Energy Cost Performance

Generated by Helixon Energy Intelligence Platform

`

document.getElementById("esgOutput").innerText=report

}

loadDashboard()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"></script>
<style>
/* --- Dark Premium Theme --- */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#0f1419;color:#ffffff;padding:20px;min-height:100vh}
.dashboard-container{max-width:1200px;margin:0 auto;background:#1e293b;border-radius:20px;padding:30px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5)}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;flex-wrap:wrap;gap:15px}
.header h1{font-size:24px;font-weight:600;color:#f1f5f9}
.controls{display:flex;gap:10px;align-items:center}
.btn{background:#334155;border:none;color:#cbd5e1;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px;transition:all 0.3s ease}
.btn:hover{background:#475569}
.btn-primary{background:#10b981;color:white}
.btn-primary:hover{background:#059669}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:30px}
.metric-card{background:#0f172a;border-radius:16px;padding:24px;border:1px solid #334155;transition:transform 0.3s ease}
.metric-card:hover{transform:translateY(-5px);border-color:#10b981}
.metric-label{color:#94a3b8;font-size:14px;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.metric-value{font-size:32px;font-weight:700;color:#ffffff;display:flex;align-items:baseline;gap:8px}
.metric-unit{font-size:16px;color:#64748b;font-weight:500}
.metric-trend{display:inline-flex;align-items:center;gap:4px;color:#10b981;font-size:14px;margin-top:8px}
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
.chart-card{background:#0f172a;border-radius:16px;padding:24px;border:1px solid #334155}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.chart-title{font-size:18px;font-weight:600;color:#f1f5f9}
.chart-btn{background:#1e293b;border:1px solid #475569;color:#94a3b8;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.line-chart-container{position:relative;height:250px;width:100%}
.line-chart{width:100%;height:100%}
.pie-chart-container{display:flex;flex-direction:column;align-items:center;gap:20px}
.pie-chart{width:200px;height:200px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center}
.pie-center{width:120px;height:120px;background:#0f172a;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#ffffff}
.legend{display:flex;flex-direction:column;gap:12px;width:100%}
.legend-item{display:flex;align-items:center;justify-content:space-between;font-size:14px}
.legend-color{width:12px;height:12px;border-radius:3px;margin-right:10px}
.legend-label{display:flex;align-items:center;color:#cbd5e1}
.legend-value{color:#94a3b8;font-weight:600}
.mini-bars{display:flex;align-items:flex-end;gap:4px;height:40px;margin-left:auto}
.mini-bar{width:6px;background:#10b981;border-radius:2px;opacity:0.6}
.mini-bar.active{opacity:1;background:#34d399}
@media(max-width:768px){.charts-grid{grid-template-columns:1fr}.metrics-grid{grid-template-columns:1fr}}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.metric-card,.chart-card{animation:fadeIn 0.6s ease forwards}
.metric-card:nth-child(1){animation-delay:0.1s}
.metric-card:nth-child(2){animation-delay:0.2s}
.metric-card:nth-child(3){animation-delay:0.3s}
.metric-card:nth-child(4){animation-delay:0.4s}
</style>
</head>
<body>
<div class="dashboard-container">
    <div class="header">
        <h1>Energy Dashboard</h1>
        <div class="controls">
            <button id="facilityBtn" class="btn">All Facilities ▼</button>
            <button id="monthBtn" class="btn">All Months ▼</button>
            <button id="refreshBtn" class="btn btn-primary">Refresh</button>
        </div>
    </div>

    <div class="metrics-grid">
        <div class="metric-card"><div class="metric-label">Total Usage</div><div class="metric-value" id="totalUsage">0</div></div>
        <div class="metric-card"><div class="metric-label">Total Cost</div><div class="metric-value" id="totalCost">0</div></div>
        <div class="metric-card"><div class="metric-label">Total Emission</div><div class="metric-value" id="totalEmission">0</div></div>
        <div class="metric-card"><div class="metric-label">Efficiency</div><div class="metric-value" id="efficiency">0%</div></div>
    </div>

    <div class="charts-grid">
        <div class="chart-card">
            <div class="chart-header"><h3 class="chart-title">Emission per Energy Type</h3></div>
            <canvas id="stackedChart"></canvas>
        </div>
        <div class="chart-card">
            <div class="chart-header"><h3 class="chart-title">Trend per Month</h3></div>
            <canvas id="trendChart"></canvas>
        </div>
    </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL = 'https://otzxkvdkpbsyrbiqtbjd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJzdXBhYmFzZSIsInJlZiI6Im90enhrdmRrcGJzeXJiaXF0YmpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1NTY3NDYsImV4cCI6MjA4NzEzMjc0Nn0.tmLk2MoEpRbAdZNT5tRZTRvH_laeRo5Y1t-ollBGNAQ';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let facilityFilter = null;
let monthFilter = null;
let stackedChart, trendChart;

const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

document.getElementById('facilityBtn').addEventListener('click',()=>{
    facilityFilter = facilityFilter ? null : 'Main Facility';
    document.getElementById('facilityBtn').textContent = facilityFilter ? facilityFilter+' ▼' : 'All Facilities ▼';
    loadDashboard();
});

document.getElementById('monthBtn').addEventListener('click',()=>{
    monthFilter = monthFilter ? null : '2026-02-01T00:00:00+00:00';
    document.getElementById('monthBtn').textContent = monthFilter ? 'Feb ▼' : 'All Months ▼';
    loadDashboard();
});

document.getElementById('refreshBtn').addEventListener('click',()=>loadDashboard());

async function loadDashboard(){
    const query = supabase.from('dashboard_phase2_final_named').select('*');
    if(facilityFilter) query.eq('facility_name_display',facilityFilter);
    if(monthFilter) query.eq('month',monthFilter);

    const { data,error } = await query;
    if(error){ console.error(error); return; }
    
    updateMetrics(data);
    updateCharts(data);
}

function updateMetrics(data){
    const totalUsage = data.reduce((acc,d)=>acc+(d.total_usage_facility||0),0);
    const totalCost = data.reduce((acc,d)=>acc+(d.total_cost_facility||0),0);
    const totalEmission = data.reduce((acc,d)=>acc+(d.total_emission_facility||0),0);
    const efficiency = totalUsage?Math.round(totalUsage/totalUsage*100)+'%':'0%';
    
    document.getElementById('totalUsage').textContent = totalUsage.toLocaleString();
    document.getElementById('totalCost').textContent = totalCost.toLocaleString();
    document.getElementById('totalEmission').textContent = totalEmission.toFixed(2);
    document.getElementById('efficiency').textContent = efficiency;
}

function updateCharts(data){
    const energyTypes = [...new Set(data.map(d=>d.energy_type_record))];
    const labels = energyTypes;
    const values = energyTypes.map(e=>{
        const row = data.find(d=>d.energy_type_record===e);
        return row ? row.total_emission : 0;
    });

    if(stackedChart) stackedChart.destroy();
    stackedChart = new Chart(document.getElementById('stackedChart'),{
        type:'bar',
        data:{labels, datasets:[{label:'Emission',data:values,backgroundColor:'#10b981'}]},
        options:{responsive:true,plugins:{legend:{display:false}}}
    });

    const months = [...new Set(data.map(d=>monthNames[new Date(d.month).getMonth()]))];
    const monthValues = months.map(m=>{
        return data.filter(d=>monthNames[new Date(d.month).getMonth()]==m)
                   .reduce((acc,r)=>acc+r.total_emission,0);
    });

    if(trendChart) trendChart.destroy();
    trendChart = new Chart(document.getElementById('trendChart'),{
        type:'line',
        data:{labels:months,datasets:[{label:'Total Emission',data:monthValues,borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.2)'}]},
        options:{responsive:true,plugins:{legend:{display:false}}}
    });
}

// Initial load
loadDashboard();
</script>
</body>
</html>

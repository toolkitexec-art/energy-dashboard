<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Energy Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Inter,Arial;
background:#061823;
color:#e6f1f5;
display:flex
}

.sidebar{
width:70px;
background:#081e2b;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:25px
}

.icon{
width:36px;
height:36px;
border-radius:10px;
background:#0f2f40
}

.main{
flex:1;
padding:25px
}

.title{
font-size:22px;
font-weight:600;
margin-bottom:20px
}

.kpi-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px
}

.kpi-card{
background:#0e2a3a;
border-radius:12px;
padding:18px
}

.kpi-title{
font-size:12px;
opacity:.7
}

.kpi-value{
font-size:26px;
margin-top:5px
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:18px
}

.card{
background:#0e2a3a;
border-radius:14px;
padding:18px
}

canvas{
margin-top:10px
}

</style>
</head>

<body>

<div class="sidebar">
<div class="icon"></div>
<div class="icon"></div>
<div class="icon"></div>
<div class="icon"></div>
<div class="icon"></div>
</div>

<div class="main">

<div class="title">Energy Dashboard</div>

<div id="loading">Loading data...</div>

<div id="kpi-container" class="kpi-grid"></div>

<div class="grid">

<div class="card">
<h3>Monthly Usage</h3>
<canvas id="trendChart"></canvas>
</div>

<div class="card">
<h3>Energy Mix</h3>
<canvas id="mixChart"></canvas>
</div>

</div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>

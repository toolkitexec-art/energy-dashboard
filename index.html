<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Helixon Energy Intelligence</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- HEADER -->

<div style="display:flex;align-items:center;gap:10px;margin-bottom:15px;">

<img src="logo-helixon.png" style="width:38px;height:38px;">

<h1>Helixon Energy Intelligence</h1>

</div>


<!-- FILTER -->

<select id="facility-select">
<option value="all">All Facilities</option>
</select>

<select id="month-select">
<option value="all">All Months</option>
</select>


<!-- KPI -->

<div id="kpi-container"></div>


<!-- ANALYTICS -->

<div class="analytics-card">
<div>Industry Benchmark</div>
<div id="benchmark-value"></div>
</div>

<div class="analytics-card">
<div>Energy Efficiency Score</div>
<div id="efficiency-score"></div>
</div>

<div class="analytics-card">
<div>Emission Reduction Potential</div>
<div id="reduction-ai"></div>
</div>

<div class="analytics-card">
<div>Cost Saving Opportunity</div>
<div id="saving-ai"></div>
</div>


<!-- ENERGY TYPE -->

<h3>Energy Type Comparison</h3>

<div id="energy-total" style="font-size:24px;margin-bottom:10px;"></div>

<canvas id="stackedChart"></canvas>


<!-- TREND -->

<h3>Emission Trend</h3>

<canvas id="trendChart"></canvas>


<!-- FACILITY -->

<h3>Facility Comparison</h3>

<canvas id="facilityChart"></canvas>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<script type="module" src="script.js"></script>

</body>

</html>

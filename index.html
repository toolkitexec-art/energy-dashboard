<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helixon Energy Intelligence</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <img src="logo-helixon.png" alt="Logo Helixon">
  <h1>Helixon Energy Intelligence</h1>
</div>

<!-- FILTER -->
<div class="filters">
  <select id="facility-select">
    <option value="all">All Facilities</option>
  </select>
  <select id="month-select">
    <option value="all">All Months</option>
  </select>
</div>

<!-- KPI GRID -->
<div id="kpi-container">
  <div class="analytics-card">
    <div>Total Usage</div>
    <div id="total-usage">950.00</div>
  </div>
  <div class="analytics-card">
    <div>Total Cost</div>
    <div id="total-cost">$200850.00</div>
  </div>
  <div class="analytics-card">
    <div>Total Emission</div>
    <div id="total-emission">245.00</div>
  </div>
</div>

<!-- ENERGY TYPE -->
<h3>Energy Type Comparison</h3>
<div id="energy-total" style="font-size:24px;margin-bottom:10px;"></div>
<canvas id="stackedChart"></canvas>

<!-- EMISSION TREND -->
<h3>Emission Trend</h3>
<canvas id="trendChart"></canvas>

<!-- FACILITY COMPARISON -->
<h3>Facility Comparison</h3>
<canvas id="facilityChart"></canvas>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<!-- Dashboard Script -->
<script type="module" src="script.js"></script>

<!-- Export JS -->
<script src="export.js"></script>

<!-- Export Button -->
<button id="export-pdf-btn">Export PDF</button>

<!-- Preview Container -->
<div id="pdf-preview-container" style="display:none;"></div>

</body>
</html>

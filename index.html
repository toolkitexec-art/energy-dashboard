<!DOCTYPE html><html>
<head><meta charset="UTF-8">
<title>Helixon Energy Intelligence</title><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body><div class="sidebar"><div class="logo">HX</div><div class="menu">
<div class="menu-item">Dashboard</div>
<div class="menu-item">Facilities</div>
<div class="menu-item">Energy</div>
<div class="menu-item">Carbon</div>
</div></div><div class="main"><div class="topbar"><div class="title">
Helixon Energy Intelligence
</div><select id="facilityFilter"></select>

<select id="energyFilter">
<option value="all">All Energy</option>
<option value="electricity">Electricity</option>
<option value="gas">Gas</option>
<option value="diesel">Diesel</option>
<option value="renewable">Renewable</option>
</select></div><div class="kpi-grid"><div class="kpi">
<span>Total Energy</span>
<h2 id="kpiEnergy">0</h2>
</div><div class="kpi">
<span>Total Cost</span>
<h2 id="kpiCost">0</h2>
</div><div class="kpi">
<span>CO₂ Emission</span>
<h2 id="kpiCO2">0</h2>
</div><div class="kpi">
<span>Efficiency</span>
<h2 id="kpiEfficiency">0%</h2>
</div></div><div class="charts"><div class="chart-card">
<h3>Energy Trend</h3>
<canvas id="trendChart"></canvas>
</div><div class="chart-card">
<h3>Energy Mix</h3>
<canvas id="mixChart"></canvas>
</div></div><div class="charts"><div class="chart-card">
<h3>Cost Analysis</h3>
<canvas id="costChart"></canvas>
</div><div class="chart-card">
<h3>Carbon Emission Trend</h3>
<canvas id="carbonChart"></canvas>
</div></div></div><script src="script.js" type="module"></script></body>
</html>

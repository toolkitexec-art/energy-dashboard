<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helixon PDF Preview</title>
<link rel="stylesheet" href="style.css">
<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#020617;
    color:#e5e7eb;
}

/* Scrollable preview container */
#pdf-preview {
    width:90%;
    max-width:1000px;
    margin:30px auto;
    padding:20px;
    background:#020617;
    border:1px solid #334155;
    border-radius:12px;
    color:#e5e7eb;
    max-height:80vh;
    overflow-y:auto;
}

/* Each PDF page */
.pdf-page {
    page-break-after: always;
    padding:40px 30px;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    min-height:100vh;
    background:#020617;
    box-sizing:border-box;
    margin-bottom:20px;
}

.pdf-page:last-child { page-break-after:auto; }

.pdf-page h3 {
    margin-top:0;
    margin-bottom:20px;
    font-size:18px;
}

.pdf-chart-wrapper {
    display:flex;
    flex-direction:column;
    gap:30px;
}

/* KPI cards in preview */
#kpi-container .analytics-card {
    padding:30px;
    font-size:20px;
}
#kpi-container .analytics-card div:first-child {
    font-size:14px;
}
#kpi-container .analytics-card div:last-child {
    font-size:22px;
}
</style>
</head>
<body>

<h1 style="text-align:center; margin-top:20px;">Helixon PDF Preview</h1>

<div id="pdf-preview"></div>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script type="module">
// Simulasi data sama dengan dashboard
function createDummyDashboard() {
    const container = document.createElement("div");
    container.id = "kpi-container";

    const cards = [
        {label:"Total Usage", value:"950.00"},
        {label:"Total Cost", value:"$200850.00"},
        {label:"Total Emission", value:"245.00"}
    ];

    cards.forEach(c=>{
        const card = document.createElement("div");
        card.className="analytics-card";
        card.innerHTML=`<div>${c.label}</div><div>${c.value}</div>`;
        container.appendChild(card);
    });

    document.body.appendChild(container);

    // Dummy charts
    const chartIds = ["stackedChart","trendChart","facilityChart"];
    chartIds.forEach(id=>{
        const c = document.createElement("canvas");
        c.id = id;
        c.style.height="300px";
        c.style.width="100%";
        document.body.appendChild(c);
        new Chart(c.getContext("2d"),{
            type:'bar',
            data:{labels:["A","B","C"], datasets:[{label:"Value", data:[10,20,15], backgroundColor:"#3b82f6"}]},
            options:{responsive:true, plugins:{datalabels:{color:"#fff"}}}
        });
    });
}

function createPDFPage(title, elements){
    const page = document.createElement("div");
    page.className="pdf-page";

    const wrapper = document.createElement("div");
    wrapper.className="pdf-chart-wrapper";

    if(title){
        const h3 = document.createElement("h3");
        h3.innerText = title;
        wrapper.appendChild(h3);
    }

    elements.forEach(el => wrapper.appendChild(el.cloneNode(true)));
    page.appendChild(wrapper);
    return page;
}

// Preview rendering
function renderPreview() {
    createDummyDashboard();
    const container = document.getElementById("pdf-preview");

    // Page 1: KPI + Energy Type
    const page1 = createPDFPage(null, [
        document.getElementById("kpi-container"),
        document.getElementById("stackedChart")
    ]);
    const h3Energy = document.createElement("h3");
    h3Energy.innerText="Energy Type Comparison";
    page1.querySelector(".pdf-chart-wrapper").insertBefore(h3Energy, page1.querySelector(".pdf-chart-wrapper").children[1]);
    container.appendChild(page1);

    // Page 2: Emission Trend + Facility Comparison
    const page2 = createPDFPage(null, [
        document.getElementById("trendChart"),
        document.getElementById("facilityChart")
    ]);
    const h3Trend = document.createElement("h3");
    h3Trend.innerText="Emission Trend";
    page2.querySelector(".pdf-chart-wrapper").insertBefore(h3Trend, page2.querySelector(".pdf-chart-wrapper").children[0]);
    const h3Facility = document.createElement("h3");
    h3Facility.innerText="Facility Comparison";
    page2.querySelector(".pdf-chart-wrapper").appendChild(h3Facility);
    container.appendChild(page2);
}

renderPreview();
</script>

</body>
</html>
